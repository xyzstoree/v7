<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #222222;
      --muted: #666666;
      --border: #dddddd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      background: #fff;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 700;
    }
    p {
      margin: 6px 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .code {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px dashed var(--border);
      font-family: "Courier New", monospace;
      color: #333;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 Not Found</h1>
    <p>The requested URL was not found on this server.</p>
    <p>Please check the address and try again.</p>
    <div class="code">Status: 404</div>
  </main>
</body>
</html>
